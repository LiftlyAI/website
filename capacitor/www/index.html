<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Liftly</title>
    <style>
      :root {
        --ink: #050507;
        --blue: #2b6bff;
        --cream: #f4f5f7;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--ink);
        color: var(--cream);
        font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        text-align: center;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      .mark {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .mark span {
        color: var(--blue);
      }
      .msg {
        max-width: 22rem;
        line-height: 1.5;
        opacity: 0.7;
        font-size: 0.95rem;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      button {
        margin-top: 0.5rem;
        background: var(--blue);
        color: #fff;
        border: 0;
        border-radius: 0.6rem;
        padding: 0.75rem 1.5rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="mark">Lift<span>ly</span></div>
    <div class="spinner" id="spinner"></div>
    <p class="msg" id="msg">Connecting…</p>
    <button id="retry" style="display: none" onclick="location.reload()">
      Retry
    </button>
    <script>
      // This page only shows when the device is offline. When a connection is
      // available the native shell loads the live site instead.
      function check() {
        if (!navigator.onLine) {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('msg').textContent =
            'You appear to be offline. Liftly needs a connection to load your training.';
          document.getElementById('retry').style.display = 'inline-block';
        }
      }
      window.addEventListener('online', () => location.reload());
      setTimeout(check, 1500);
    </script>
  </body>
</html>
